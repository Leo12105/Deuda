<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Deuda - Tía</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>💰 Control de Deuda con mi Tía</h1>

        <!-- RESUMEN -->
        <div class="resumen">
            <div class="card total">
                <h3>Deuda Total</h3>
                <p id="deudaTotal">$0.00</p>
            </div>
            <div class="card pagado">
                <h3>Total Pagado</h3>
                <p id="totalPagado">$0.00</p>
            </div>
            <div class="card restante">
                <h3>Restante</h3>
                <p id="restante">$0.00</p>
            </div>
        </div>

        <!-- BARRA DE PROGRESO -->
        <div class="progreso-container">
            <div class="progreso-barra" id="barraProgreso">
                <span id="porcentaje">0%</span>
            </div>
        </div>

        <!-- CONFIGURAR DEUDA -->
        <div class="seccion">
            <h2>📝 Configurar Deuda Total</h2>
            <div class="form-group">
                <input type="number" id="inputDeuda" placeholder="Monto total de la deuda">
                <button onclick="establecerDeuda()">Establecer Deuda</button>
            </div>
        </div>

        <!-- REGISTRAR PAGO -->
        <div class="seccion">
            <h2>💵 Registrar un Pago</h2>
            <div class="form-group">
                <input type="number" id="inputPago" placeholder="Monto del pago">
                <input type="date" id="inputFecha">
                <input type="text" id="inputNota" placeholder="Nota (opcional)">
                <button onclick="registrarPago()">Registrar Pago</button>
            </div>
        </div>

        <!-- HISTORIAL DE PAGOS -->
        <div class="seccion">
            <h2>📋 Historial de Pagos</h2>
            <table id="tablaPagos">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Fecha</th>
                        <th>Monto</th>
                        <th>Nota</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla">
                </tbody>
            </table>
            <p id="sinPagos">No hay pagos registrados aún.</p>
        </div>

        <!-- BOTÓN BORRAR TODO -->
        <button class="btn-borrar" onclick="borrarTodo()">🗑️ Borrar todo</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
